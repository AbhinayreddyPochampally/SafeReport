# Nixpacks config for SafeReport (Next.js 14 App Router on Railway).
# Pins Node 20 and explicit build/start phases so the builder doesn't
# fall back to a generic Node detector that misses `next build`.

[phases.setup]
# npm ships with nodejs_20 — listing it separately fails because there
# is no standalone `npm` derivation in nixpkgs.
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --prefer-offline --no-audit --no-fund"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
